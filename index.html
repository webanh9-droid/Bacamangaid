<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BACA MANGA - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      transition: background 0.3s, color 0.3s;
    }

    .light-mode {
      background: #f0f0f0;
      color: #111;
    }

    .hamburger {
      font-size: 30px;
      cursor: pointer;
      padding: 15px;
      color: white;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
    }

    .sidebar {
      height: 100%;
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px;
      background-color: rgba(0, 0, 0, 0.9);
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background-color: #444;
    }

    .overlay {
      position: fixed;
      display: none;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    header {
      background-color: #222;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #4db8ff;
    }

    .search-container {
      text-align: center;
      padding: 15px;
      background-color: #1a1a1a;
    }

    .search-container input[type="text"] {
      padding: 10px;
      font-size: 16px;
      width: 70%;
      border: 1px solid #333;
      border-radius: 5px;
      background: #222;
      color: white;
      box-sizing: border-box;
    }

    .komik-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 15px;
    }

    .komik {
      background-color: #222;
      margin: 10px;
      border-radius: 10px;
      overflow: hidden;
      width: 200px;
      position: relative;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .light-mode .komik {
      background-color: #ddd;
      color: #000;
    }

    .komik img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .komik-title {
      padding: 12px 8px;
      font-size: 15px;
      text-align: center;
      background-color: #333;
      min-height: 78px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.3;
    }

    .light-mode .komik-title {
      background-color: #ccc;
      color: #000;
    }

    .avg-rating {
      font-size: 13px;
      color: gold;
      margin-top: 4px;
    }

    .chapter-link {
      display: block;
      padding: 10px;
      text-align: center;
      background-color: #444;
      border-top: 1px solid #555;
      text-decoration: none;
      color: #4db8ff;
    }

    .chapter-link:hover {
      background-color: #555;
    }

    .badge-new-komik, .badge-new-chapter {
      position: absolute;
      top: 8px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: bold;
      border-radius: 4px;
      animation: pulse 1.5s infinite;
      z-index: 5;
      color: white;
    }

    .badge-new-komik {
      right: 8px;
      background-color: #ff3333;
    }

    .badge-new-chapter {
      right: 8px;
      background-color: #00cc66;
      top: 32px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1002;
      background: #333;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .pagination {
      text-align: center;
      margin: 20px;
    }

    .pagination button {
      margin: 3px;
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      background: #4db8ff;
      color: #fff;
      cursor: pointer;
    }

    .pagination button.active {
      background: #1a8cd8;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hamburger" onclick="toggleSidebar()">☰</div>
  <button class="toggle-btn" onclick="toggleMode()">🌓 Mode</button>

  <div class="sidebar" id="sidebar">
    <a href="genre.html">Genre</a>
    <a href="status.html">Status</a>
    <a href="index.html">Menu</a>
    <a href="indexanime.html">Menu Anime</a>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <header>BACA MANGA</header>

  <div class="search-container">
    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Cari manga...">
  </div>

  <div class="komik-list" id="komikContainer"></div>
  <div id="pagination" class="pagination"></div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      if (sidebar.style.left === "0px") {
        sidebar.style.left = "-250px";
        overlay.style.display = "none";
      } else {
        sidebar.style.left = "0px";
        overlay.style.display = "block";
      }
    }

    function toggleMode() {
      document.body.classList.toggle('light-mode');
    }

    function cekApakahBaru(tanggalInput) {
      if (!tanggalInput) return false;
      const tglInput = new Date(tanggalInput);
      const tglHariIni = new Date();
      const selisihWaktu = tglHariIni - tglInput;
      const selisihHari = selisihWaktu / (1000 * 60 * 60 * 24);
      return (selisihHari >= 0 && selisihHari <= 3);
    }

    let currentPage = 1;
    const itemsPerPage = 12;
    let daftarMangaGlobal = [];

    async function muatDataMangaOtomatis() {
      try {
        const response = await fetch('manga.json');
        const dataManga = await response.json();
        
        // Urutkan berdasarkan yang paling baru
        dataManga.sort((a, b) => {
          const waktuA = Math.max(new Date(a.tanggalChapterBaru || 0), new Date(a.tanggalKomikBaru || 0));
          const waktuB = Math.max(new Date(b.tanggalChapterBaru || 0), new Date(b.tanggalKomikBaru || 0));
          return waktuB - waktuA;
        });

        daftarMangaGlobal = dataManga;
        window.daftarMangaGlobal = dataManga;

        const container = document.getElementById("komikContainer");
        container.innerHTML = ""; 

        dataManga.forEach(manga => {
          const isKomikBaru = cekApakahBaru(manga.tanggalKomikBaru);
          const isChapterBaru = cekApakahBaru(manga.tanggalChapterBaru);
          
          let badgeHtml = '';
          if (isKomikBaru) badgeHtml += `<div class="badge-new-komik">NEW MANGA</div>`;
          if (isChapterBaru) badgeHtml += `<div class="badge-new-chapter">NEW CH</div>`;

          const cleanTitle = manga.title.replace(/\s+/g, '_').toLowerCase();

          const card = document.createElement("div");
          card.className = "komik";
          card.setAttribute("data-visible", "true");
          
          card.innerHTML = `
            ${badgeHtml}
            <img src="${manga.cover}" onerror="this.src='https://via.placeholder.com/200x280?text=No+Cover'" alt="Cover ${manga.title}">
            <div class="komik-title">
              ${manga.title}
              <div class="avg-rating" id="avg-${cleanTitle}">★ Loading...</div>
            </div>
            <a href="${manga.linkDaftar}" class="chapter-link">📚 Daftar Chapter</a>
            <a href="${manga.linkChapterLatest}" class="chapter-link">📖 ${manga.chapterLatest || 'Chapter Terbaru'}</a>
          `;
          container.appendChild(card);
        });

        applyFilters();

      } catch (error) {
        console.error("Gagal memuat manga.json:", error);
        document.getElementById("komikContainer").innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Gagal memuat data manga. Pastikan file manga.json ada.</p>";
      }
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const komiks = document.querySelectorAll(".komik");

      komiks.forEach((komik, index) => {
        if (daftarMangaGlobal[index]) {
          const title = daftarMangaGlobal[index].title.toLowerCase();
          komik.dataset.visible = title.includes(search) ? "true" : "false";
        }
      });

      currentPage = 1;
      showPage(currentPage);
      updatePagination();
    }

    function showPage(page) {
      let visibleIndex = 0;
      const komiks = document.querySelectorAll(".komik");

      komiks.forEach((komik) => {
        if (komik.dataset.visible === "true") {
          if (visibleIndex >= (page - 1) * itemsPerPage && visibleIndex < page * itemsPerPage) {
            komik.style.display = "block";
          } else {
            komik.style.display = "none";
          }
          visibleIndex++;
        } else {
          komik.style.display = "none";
        }
      });
    }

    function updatePagination() {
      const pagination = document.getElementById("pagination");
      pagination.innerHTML = "";

      let visibleCount = 0;
      document.querySelectorAll(".komik").forEach(k => {
        if (k.dataset.visible === "true") visibleCount++;
      });

      const totalPages = Math.ceil(visibleCount / itemsPerPage);

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
          currentPage = i;
          showPage(currentPage);
          updatePagination();
        };
        pagination.appendChild(btn);
      }
    }

    // ==================== RATING SYSTEM ====================
    function loadAverageRatings() {
      daftarMangaGlobal.forEach(manga => {
        const cleanTitle = manga.title.replace(/\s+/g, '_').toLowerCase();
        const key = "rating_" + cleanTitle;
        const data = JSON.parse(localStorage.getItem(key)) || { ratings: [] };
        
        let avg = 0;
        if (data.ratings.length > 0) {
          avg = (data.ratings.reduce((a, b) => a + b, 0) / data.ratings.length).toFixed(1);
        }

        const avgElement = document.getElementById(`avg-${cleanTitle}`);
        if (avgElement) {
          avgElement.innerHTML = avg > 0 
            ? `★ \( {avg} ( \){data.ratings.length})` 
            : '☆ Belum ada rating';
        }
      });
    }

    // Mulai aplikasi
    window.addEventListener('load', () => {
      muatDataMangaOtomatis().then(() => {
        setTimeout(loadAverageRatings, 800);
      });
    });
  </script>
</body>
</html>
