<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Genre: Romance</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: #fff;
      background: #000 url('background.jpg') no-repeat center center;
      background-size: cover;
    }
    .toggle-mode {
      position: fixed;
      top: 10px;
      right: 10px;
      background-color: #444;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1002;
    }
    .hamburger {
      font-size: 30px;
      cursor: pointer;
      padding: 15px;
      color: white;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
    }
    .sidebar {
      height: 100%;
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px;
      background-color: rgba(0, 0, 0, 0.95);
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }
    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
      transition: 0.3s;
    }
    .sidebar a:hover {
      background-color: #444;
    }
    h1 {
      text-align: center;
      margin: 80px 0 20px;
      color: #b0e0e6;
    }
    .manga-card {
      background-color: #222;
      padding: 15px;
      margin: 15px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
      text-align: center;
    }
    .anime {
      margin-top: 20px;
    }
    .anime img {
      width: 300px;
      border-radius: 8px;
    }
    .anime-title {
      font-size: 18px;
      margin: 10px 0;
    }
    .chapter-link {
      display: block;
      margin: 5px 0;
      color: #80c0ff;
      text-decoration: none;
    }
    .chapter-link:hover {
      text-decoration: underline;
    }
    .search-container input {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
      background-color: #111;
      color: white;
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8040591263995189"
     crossorigin="anonymous"></script>
</head>
<body>

  <!-- Tombol Mode -->
  <button class="toggle-mode" onclick="toggleMode()">🌓 Mode</button>

  <!-- Hamburger -->
  <div class="hamburger" onclick="toggleSidebar()">☰</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <a href="genre anime.html">Genre</a>
    <a href="statusanime.html">Status</a>
    <a href="indexanime.html">Menu Anime</a>
    <a href="index.html">Menu Manga</a>
  </div>

  <h1>Genre: Romance</h1>

  <div class="manga-card">
    <header><strong>Nonton Anime</strong></header>

    <div class="search-container">
      <input type="text" id="searchInput" onkeyup="searchanime()" placeholder="Cari anime...">
    </div>

    <div class="anime-list">
      <div class="anime">
        <img src="gambar 1.png" alt="Cover Komik 1">
        <div class="anime-title">Cultural Exchange with a Game Centre Girl</div>
        <a href="kaoruhanalist.html" class="chapter-link">> Daftar</a>
        <a href="kaoruhanaeps4.html" class="chapter-link">> Episode 4</a>
      </div>

      <div class="anime">
        <img src="gambar5.png" alt="Cover Komik 2">
        <div class="anime-title">Nama Anime 2</div>
        <a href="chapter1.html" class="chapter-link">> Chapter 1</a>
      </div>
    </div>
  </div>

  <script>
    function toggleMode() {
      const body = document.body;
      const isDark = body.style.backgroundColor === 'white';
      body.style.backgroundColor = isDark ? '#111' : 'white';
      body.style.color = isDark ? 'white' : 'black';

      // Toggle input background if needed
      const inputs = document.querySelectorAll('input[type="text"]');
      inputs.forEach(input => {
        input.style.backgroundColor = isDark ? '#111' : '#eee';
        input.style.color = isDark ? 'white' : 'black';
      });
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.style.left = sidebar.style.left === "0px" ? "-250px" : "0px";
    }

    function searchanime() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const animeList = document.getElementsByClassName("anime");

      for (let i = 0; i < animeList.length; i++) {
        const title = animeList[i].getElementsByClassName("anime-title")[0].innerText.toLowerCase();
        animeList[i].style.display = title.includes(input) ? "" : "none";
      }
    }
  </script>

</body>
</html>
