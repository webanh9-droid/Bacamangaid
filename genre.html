
<!DOCTYPE html>
<html lang="id">
<head>
  
  <meta charset="UTF-8">
  
  <title>Genre Manga</title>
  <style>

    body {
      margin: 0;
      font-family: sans-serif;
      color: #fff;
      background: #000 url('background.jpg') no-repeat center center;
      background-size: cover;
    }
  .toggle-mode {
    position: fixed;
    top: 10px;
    right: 10px;
    background-color: #444;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 1002;}

    .overlay {
      background-color: rgba(0, 0, 0, 0.8);
      min-height: 100vh;
    }

    .cover {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
    }

    .cover img {
      width: auto;
      max-width: 90%;
      height: auto;
      max-height: 400px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .content {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .chapter-list {
      max-height: 600px;
      overflow-y: auto;
      padding: 10px;
      background: #111;
      border-radius: 8px;
    }

    .chapter-list a {
      display: block;
      padding: 10px;
      margin: 5px 0;
      color: #00f2ff;
      background: #222;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.2s;
    }

    .chapter-list a:hover {
      background: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
      background: #222;
      color: white;
    }

    /* Hamburger Menu */
    .hamburger {
      font-size: 30px;
      cursor: pointer;
      padding: 15px;
      color: white;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
    }

    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px;
      background-color: rgba(0, 0, 0, 0.95);
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background-color: #444;
    }

    .overlay-sidebar {
      position: fixed;
      display: none;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
  </style>
  <script>
  function toggleMode() {
    const body = document.body;
    if (body.style.backgroundColor === 'white') {
      body.style.backgroundColor = '#111';
      body.style.color = 'white';
    } else {
      body.style.backgroundColor = 'white';
      body.style.color = '#111';
    }
  }
  
  </script>
</head>
<body>
<button class="toggle-mode" onclick="toggleMode()">🌓 Mode</button>
 
  <!-- Hamburger -->
  <div class="hamburger" onclick="toggleSidebar()">☰</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <a href="genre.html">Genre</a>
    <a href="status.html">Status</a>
    <a href="index.html">Menu</a>
    <a href="indexanime.html">Menu Anime</a>
  </div>
  </style>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    .genre-btn {
      display: block;
      padding: 15px;
      margin: 10px auto;
      width: 200px;
      background-color: #444;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    .genre-btn:hover {
      background-color: #666;
    }
  </style>
  <script>
    function searchManga() {
      var input = document.getElementById("searchInput").value.toLowerCase();
      if (!input) return;
      var chapter = parseInt(input.replace(/[^\d]/g, ''));
      if (!isNaN(chapter)) {
        window.location.href = "bab" + chapter + ".html";
      } else {
        alert("Masukkan angka bab yang valid, misalnya: 12");
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlaySidebar");
      if (sidebar.style.left === "0px") {
        sidebar.style.left = "-250px";
        overlay.style.display = "none";
      } else {
        sidebar.style.left = "0px";
        overlay.style.display = "block";
      }
    }
  </script>

     crossorigin="anonymous"></script>
</head>

</body>
</html>
